spring.application.name=blog-projesi

# Server configuration
server.port=${PORT:8080}

# ==================== PostgreSQL Database Configuration ====================
# Lokalde çalışırken bu değerleri kullan, production'da çevre değişkenleri kullanılacak
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/blogdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ==================== Thymeleaf Configuration ====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==================== Web Configuration ====================
spring.web.resources.static-locations=classpath:/static/

# ==================== Logging Configuration ====================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.blog.blogprojesi=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== Session Configuration ====================
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=BLOG_SESSION

# ==================== PostgreSQL Hazır İfade Hatası Çözümü ====================
# Eğer 'prepared statement "S_1" already exists' hatası alıyorsanız, aşağıdaki ayarları ekleyin:
# HikariCP'de prepared statement cache'i kapatılır
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=0
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=0
# Hibernate'in metadata için JDBC kullanmasını kapatır
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ==================== Error Page Configuration ====================
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never

spring.jpa.properties.hibernate.prepare_sql=false

